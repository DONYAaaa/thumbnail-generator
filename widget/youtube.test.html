<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTubeParser — Test</title>
</head>
<body style="margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0f0f0f;color:#e1e1e1;display:flex;justify-content:center;padding:40px 16px">

  <div style="width:100%;max-width:640px">
    <h1 style="font-size:22px;margin:0 0 24px">YouTubeParser Test</h1>

    <div style="display:flex;gap:8px">
      <input
        id="url"
        type="text"
        placeholder="Paste YouTube URL…"
        style="flex:1;padding:10px 14px;border:1px solid #333;border-radius:8px;background:#1a1a1a;color:#e1e1e1;font-size:15px;outline:none"
      >
      <button
        id="btn"
        style="padding:10px 20px;border:none;border-radius:8px;background:#c00;color:#fff;font-size:15px;cursor:pointer;white-space:nowrap"
      >Test</button>
    </div>

    <div id="result" style="margin-top:24px"></div>
  </div>

  <script src="youtube.js"></script>
  <script>
    var urlInput = document.getElementById("url");
    var btn      = document.getElementById("btn");
    var result   = document.getElementById("result");

    function showError(msg) {
      result.innerHTML =
        '<div style="padding:14px 18px;background:#2a1010;border:1px solid #522;border-radius:8px;color:#f66">' +
        escapeHtml(msg) +
        '</div>';
    }

    function escapeHtml(s) {
      var d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function showData(d) {
      result.innerHTML =
        '<div style="border:1px solid #333;border-radius:8px;overflow:hidden;background:#1a1a1a">' +
          '<img src="' + escapeHtml(d.thumbnail_url) + '" style="width:100%;display:block">' +
          '<div style="padding:16px">' +
            '<div style="font-size:17px;font-weight:600;margin-bottom:6px">' + escapeHtml(d.title) + '</div>' +
            '<div style="font-size:14px;color:#aaa">' + escapeHtml(d.author) + '</div>' +
            '<div style="margin-top:12px;font-size:12px;color:#666;word-break:break-all">ID: ' + escapeHtml(d.id) + '</div>' +
          '</div>' +
        '</div>';
    }

    async function run() {
      var url = urlInput.value.trim();
      if (!url) { showError("Enter a URL"); return; }

      if (!YouTubeParser.isValidYouTubeUrl(url)) {
        showError("Not a valid YouTube URL");
        return;
      }

      result.innerHTML = '<div style="color:#888">Loading…</div>';
      btn.disabled = true;

      try {
        var data = await YouTubeParser.fetchVideoData(url);
        showData(data);
      } catch (e) {
        showError(e.message);
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", run);
    urlInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") run();
    });
  </script>
</body>
</html>
